<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Wiki — Invincible Incorporated</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;1,600;1,700;1,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="wiki" data-view="picker">
  <div id="site-header"></div>

  <main class="wiki-wrap">
    <div class="wiki-hero">
      <div class="page-eyebrow">EVERYTHING ABOUT THE MOD</div>
      <h1>THE <span class="accent">WIKI</span></h1>
      <div class="wiki-searchbar">
        <span class="wiki-search-ico">🔍</span>
        <input id="wiki-search" type="text" placeholder="Search powers, races, NPCs, items…" autocomplete="off">
      </div>
      <p class="wiki-lede">Pick a category to dive in. Every power, race, bloodline, NPC and system in Invincible Incorporated — documented by the community.</p>
    </div>

    <div id="search-results" class="search-results"></div>
    <div id="cat-grid" class="cat-grid"></div>
  </main>

  <div id="site-footer"></div>
  <script src="site.js"></script>
  <script src="wiki-data.js"></script>
  <script src="wiki.js"></script>
</body>
</html>
