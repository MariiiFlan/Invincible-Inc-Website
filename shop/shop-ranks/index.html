<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rank Store — Invincible Inc</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Bangers&family=Barlow:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{margin:0;background:#05070c;color:#fff;font-family:'Barlow',sans-serif}
a{text-decoration:none}
.bar{display:flex;justify-content:space-between;align-items:center;padding:18px 40px;border-bottom:3px solid #1b2130}
.crumb{font-weight:900;font-size:12px;letter-spacing:2px;color:#2E6BFF}
.h1{font-family:'Anton';font-style:italic;font-size:34px;margin:2px 0 0}
.secure{font-weight:900;font-size:11px;letter-spacing:1.5px;color:#8a93a6}
.dot{display:inline-block;width:10px;height:10px;border-radius:50%;background:#3ddc84;margin-right:8px}
.wrap{padding:34px 40px 80px;max-width:1500px;margin:0 auto}
.back{font-family:'Anton';font-style:italic;font-size:15px;color:#8a93a6}
.kicker{font-family:'Bangers';font-size:15px;letter-spacing:2px;color:#E11515;margin-top:24px}
.big{font-family:'Anton';font-style:italic;font-size:46px;line-height:.9;margin:2px 0 6px}
.sub{font-size:14px;color:#9aa3b2;margin:0 0 24px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:18px}
.card{position:relative;display:flex;flex-direction:column;border:3px solid #fff;box-shadow:7px 7px 0 rgba(0,0,0,.6);overflow:hidden;transition:transform .12s}
.card:hover{transform:translateY(-4px)}
.art{position:relative;overflow:hidden}
.art img{width:100%;height:300px;object-fit:cover;display:block}
.fade{position:absolute;left:0;right:0;bottom:0;height:130px;background:linear-gradient(transparent,rgba(0,0,0,.85))}
.meta{position:absolute;left:14px;right:14px;bottom:12px}
.tier{font-weight:900;font-size:10px;letter-spacing:2px;color:#e8ebf0}
.row{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
.name{font-family:'Anton';font-style:italic;font-size:24px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.price{font-family:'Anton';font-style:italic;font-size:24px;color:#FFD23D;white-space:nowrap}
.view{display:flex;justify-content:space-between;align-items:center;background:#0d0f14;padding:13px 16px;font-family:'Anton';font-style:italic;font-size:15px;color:#8fb0ff}
.view i{color:#FFD23D;font-style:normal}
.pop{position:absolute;top:12px;right:12px;z-index:2;background:#fff;color:#E11515;font-family:'Anton';font-style:italic;font-size:12px;padding:4px 10px}
.upwrap{margin-top:54px}
.upkick{font-family:'Bangers';font-size:15px;letter-spacing:2px;color:#34E5A0}
.userbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:0 0 22px}
.lbl{font-weight:800;font-size:11px;letter-spacing:1px;color:#5b6270}
input{background:#05070c;border:2px solid #243044;color:#fff;font-family:'Barlow';font-weight:700;font-size:14px;padding:9px 12px;outline:none;min-width:220px}
.msg{font-weight:700;font-size:12px;color:#ff5a5a}
.upgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.upcard{background:#0d0f14;border:3px solid #fff;box-shadow:6px 6px 0 rgba(0,0,0,.55);padding:16px;display:flex;flex-direction:column;gap:13px}
.pill{font-family:'Anton';font-style:italic;font-size:14px;padding:2px 9px;border:2px solid}
.arrow{font-family:'Anton';color:#FFD23D;font-size:18px}
.updiff{font-family:'Anton';font-style:italic;font-size:30px;color:#FFD23D}
.note{font-weight:700;font-size:11px;color:#5b6270}
.btn{display:block;text-align:center;cursor:pointer;background:#FFD23D;border:2px solid #fff;padding:10px;font-family:'Anton';font-style:italic;font-size:15px;color:#111;transition:all .12s}
.btn:hover{background:#34E5A0}
@media(max-width:1200px){.grid{grid-template-columns:repeat(2,1fr)}.upgrid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="bar">
  <div>
    <div class="crumb">SHOP &rsaquo; RANKS</div>
    <div class="h1">RANK STORE</div>
  </div>
  <div class="secure"><span class="dot"></span>SECURE CHECKOUT &middot; INSTANT IN-GAME DELIVERY</div>
</div>

<div class="wrap">
  <a class="back" href="/shop/index.html">&lsaquo; BACK TO SERVER SHOP</a>
  <div class="kicker">CHOOSE YOUR TIER</div>
  <div class="big">RANKS</div>
  <p class="sub">Tap a tier to see everything it unlocks.</p>

  <div class="grid" id="rankGrid"></div>

  <div class="upwrap">
    <div class="upkick">ALREADY HAVE A RANK?</div>
    <div class="big" style="font-size:40px">RANK UPGRADES</div>
    <p class="sub">Own a rank already? Upgrade and pay only the difference.</p>
    <div class="userbar">
      <span class="lbl">MINECRAFT USERNAME</span>
      <input id="upUser" placeholder="Your username" autocomplete="off" spellcheck="false">
      <span class="msg" id="upMsg"></span>
    </div>
    <div class="upgrid" id="upGrid"></div>
  </div>
</div>

<script>
var TOKEN = 'v7x1-d56f91e2669f8af87a3481d30edc66e27808fe60';
var API   = 'https://headless.tebex.io/api';

var RANKS = [
  { key:'beta',       name:'BETA TESTER', price:'$9.99',  tier:'BETA ACCESS', color:'#2E6BFF', popular:false },
  { key:'atomic',     name:'ATOMIC',      price:'$9.99',  tier:'ENTRY TIER',  color:'#EC4899', popular:false },
  { key:'immortal',   name:'IMMORTAL',    price:'$24.99', tier:'TIER II',     color:'#FFD23D', popular:false },
  { key:'invincible', name:'INVINCIBLE',  price:'$39.99', tier:'TIER III',    color:'#E11515', popular:true  },
  { key:'conquest',   name:'CONQUEST',    price:'$59.99', tier:'ULTIMATE',    color:'#8B2FE0', popular:false }
];

var UPGRADES = [
  { from:'ATOMIC',     to:'IMMORTAL',   fromColor:'#EC4899', toColor:'#FFD23D', price:'$15.00', pkg:6402112 },
  { from:'ATOMIC',     to:'INVINCIBLE', fromColor:'#EC4899', toColor:'#E11515', price:'$30.00', pkg:7575035 },
  { from:'ATOMIC',     to:'CONQUEST',   fromColor:'#EC4899', toColor:'#8B2FE0', price:'$50.00', pkg:7575036 },
  { from:'IMMORTAL',   to:'INVINCIBLE', fromColor:'#FFD23D', toColor:'#E11515', price:'$15.00', pkg:7575040 },
  { from:'IMMORTAL',   to:'CONQUEST',   fromColor:'#FFD23D', toColor:'#8B2FE0', price:'$35.00', pkg:7575043 },
  { from:'INVINCIBLE', to:'CONQUEST',   fromColor:'#E11515', toColor:'#8B2FE0', price:'$20.00', pkg:7575046 }
];

/* build rank cards */
document.getElementById('rankGrid').innerHTML = RANKS.map(function(r){
  return '<a class="card" href="/shop/shop-ranks/rank-' + r.key + '/index.html" style="background:' + r.color + '">'
       + (r.popular ? '<div class="pop">&#9733; POPULAR</div>' : '')
       + '<div class="art">'
       +   '<img src="/shop/shop-ranks/rank-' + r.key + '/' + r.key + '.png" alt="' + r.name + '">'
       +   '<div class="fade"></div>'
       +   '<div class="meta">'
       +     '<div class="tier">' + r.tier + '</div>'
       +     '<div class="row"><span class="name">' + r.name + '</span><span class="price">' + r.price + '</span></div>'
       +   '</div>'
       + '</div>'
       + '<div class="view">VIEW DETAILS <i>&rsaquo;</i></div>'
       + '</a>';
}).join('');

/* build upgrade cards */
document.getElementById('upGrid').innerHTML = UPGRADES.map(function(u,i){
  return '<div class="upcard">'
       + '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">'
       +   '<span class="pill" style="color:' + u.fromColor + ';border-color:' + u.fromColor + '">' + u.from + '</span>'
       +   '<span class="arrow">&#8594;</span>'
       +   '<span class="pill" style="color:' + u.toColor + ';border-color:' + u.toColor + '">' + u.to + '</span>'
       + '</div>'
       + '<div style="display:flex;align-items:baseline;gap:8px">'
       +   '<span class="updiff">' + u.price + '</span><span class="note">just the difference</span>'
       + '</div>'
       + '<a class="btn" data-i="' + i + '">UPGRADE</a>'
       + '</div>';
}).join('');

/* remember username across pages */
try {
  var saved = localStorage.getItem('iwb_mc_user');
  if (saved) document.getElementById('upUser').value = saved;
} catch(e){}

/* Tebex headless checkout */
function goCheckout(pkg, name, btn, msg){
  var restore = btn.textContent;
  btn.textContent = 'LOADING...';
  btn.style.pointerEvents = 'none';
  btn.style.opacity = '.7';

  fetch(API + '/accounts/' + TOKEN + '/baskets', {
    method:'POST',
    headers:{'Content-Type':'application/json','Accept':'application/json'},
    body: JSON.stringify({
      username: name,
      complete_url: location.origin + '/shop/shop-ranks/index.html',
      cancel_url: location.href,
      complete_auto_redirect: true
    })
  })
  .then(function(r){ if(!r.ok) throw new Error('basket'); return r.json(); })
  .then(function(j){
    var b = j.data, ident = b.ident;
    var checkout = (b.links && b.links.checkout) || null;
    return fetch(API + '/baskets/' + ident + '/packages', {
      method:'POST',
      headers:{'Content-Type':'application/json','Accept':'application/json'},
      body: JSON.stringify({ package_id: pkg, quantity: 1 })
    })
    .then(function(r){ return r.ok ? r.json() : null; })
    .then(function(a){
      if (a && a.data && a.data.links && a.data.links.checkout) checkout = a.data.links.checkout;
      return fetch(API + '/accounts/' + TOKEN + '/baskets/' + ident + '/auth?returnUrl=' + encodeURIComponent(checkout || location.href))
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(au){
          var list = Array.isArray(au) ? au : (au && au.data ? au.data : []);
          if (list && list.length && list[0] && list[0].url) return list[0].url;
          return checkout;
        })
        .catch(function(){ return checkout; });
    });
  })
  .then(function(dest){
    if (dest) { location.href = dest; return; }
    throw new Error('no checkout');
  })
  .catch(function(){
    btn.textContent = restore;
    btn.style.pointerEvents = '';
    btn.style.opacity = '';
    msg.style.color = '#ff5a5a';
    msg.textContent = 'Something went wrong — please try again.';
  });
}

document.getElementById('upGrid').addEventListener('click', function(ev){
  var btn = ev.target.closest('.btn');
  if (!btn) return;
  var msg = document.getElementById('upMsg');
  var input = document.getElementById('upUser');
  var name = (input.value || '').trim();
  msg.textContent = '';
  if (!name) {
    msg.style.color = '#ff5a5a';
    msg.textContent = 'Enter your Minecraft username first.';
    input.focus();
    return;
  }
  try { localStorage.setItem('iwb_mc_user', name); } catch(e){}
  goCheckout(UPGRADES[+btn.getAttribute('data-i')].pkg, name, btn, msg);
});
</script>
</body>
</html>
