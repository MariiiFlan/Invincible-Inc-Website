document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +

            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'try { parent.location.assign(new URL(h, parent.location.href).href); } catch(_e){ parent.location.assign(h); }' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  ranks(){\n    return [\n      { key:'beta', name:'BETA TESTER', price:'$9.99', tier:'BETA ACCESS', color:'#2E6BFF', color2:'#5b8cff', art:'/shop/shop-ranks/rank-beta/beta.png', pkg:6398720,\n        tagline:'Get in before full release.',\n        lore:'Join the test build early, help shape the mod, and carry the Beta tag as proof you were here first.',\n        includesTitle:'THIS PACKAGE INCLUDES',\n        includes:['Beta Tester rank','Beta test version of the mod','Early access to the server','Exclusive \"Beta\" tag'],\n        commands:[],\n        rewards:[],\n        note:'All advancements on the server are reset at full release. Beta versions of the mod are delivered through Discord.', buyUrl:'https://invincible-incorporated.tebex.io/package/6398720' },\n      { key:'atomic', name:'ATOMIC', price:'$9.99', tier:'ENTRY TIER', color:'#EC4899', color2:'#F9A8D4', art:'/shop/shop-ranks/rank-atomic/atomic.png', pkg:6402001,\n        tagline:'Your first taste of power.',\n        lore:'The entry tier — a clean tag, a handy command kit and room to make the server home.',\n        includesTitle:'PERKS',\n        includes:['Atomic tag in-game and on Discord','Create up to 4 homes — /sethome'],\n        commands:['/seen','/hat','/enderchest','/anvil','/furnace'],\n        rewards:['$10,000 in-game currency'],\n        note:'', buyUrl:'https://invincible-incorporated.tebex.io/package/6402001' },\n      { key:'immortal', name:'IMMORTAL', price:'$24.99', tier:'TIER II', color:'#FFD23D', color2:'#FFD23D', art:'/shop/shop-ranks/rank-immortal/immortal.png', pkg:6402033,\n        tagline:'Rise above the mortals.',\n        lore:'A wider command kit, more homes and a tag that marks you out wherever you go.',\n        includesTitle:'PERKS',\n        includes:['Immortal tag in-game and on Discord','Create up to 6 homes — /sethome'],\n        commands:['/seen','/hat','/enderchest','/anvil','/furnace','/back','/feed','/repair','/brew'],\n        rewards:['$20,000 in-game currency'],\n        note:'', buyUrl:'https://invincible-incorporated.tebex.io/package/6402033' },\n      { key:'invincible', name:'INVINCIBLE', price:'$39.99', tier:'TIER III', color:'#E11515', color2:'#ff5a5a', art:'/shop/shop-ranks/rank-invincible/invincible.png', pkg:6402061,\n        tagline:'Become unstoppable.',\n        lore:'The popular pick — a deep command arsenal, a bigger payout and space to build big.',\n        includesTitle:'PERKS',\n        includes:['Invincible tag in-game','Create up to 8 homes — /sethome'],\n        commands:['/seen','/hat','/enderchest','/anvil','/furnace','/back','/feed','/repair','/brew','/smeltall','/suicide','/extinguish'],\n        rewards:['$45,000 in-game currency'],\n        note:'', buyUrl:'https://invincible-incorporated.tebex.io/package/6402061' },\n      { key:'conquest', name:'CONQUEST', price:'$59.99', tier:'ULTIMATE', color:'#8B2FE0', color2:'#C79BFF', art:'/shop/shop-ranks/rank-conquest/conquest.png', pkg:6402078,\n        tagline:'Rule it all.',\n        lore:'The ultimate tier — the full command set, the biggest reward and a custom race or power made for you.',\n        includesTitle:'PERKS',\n        includes:['Conquest tag in-game','Create up to 10 homes — /sethome'],\n        commands:['/seen','/hat','/enderchest','/anvil','/furnace','/back','/feed','/repair','/brew','/smeltall','/sell hand','/suicide','/extinguish','/workbench','/repairall'],\n        rewards:['$105,000 in-game currency','Coupon for a custom Race or Power, created just for you on the server. You can enable your custom pick, but doing so removes your current race/power — if you later disable it you\\'ll need to randomize to get one back.'],\n        note:'', buyUrl:'https://invincible-incorporated.tebex.io/package/6402078' },\n    ];\n  }\n  currentKey(){\n    try {\n      const m = String(window.location.href).match(/rank[-=]([a-z]+)/i);\n      return m ? m[1].toLowerCase() : 'conquest';\n    } catch(e){ return 'conquest'; }\n  }\n  makeBuy(sel){\n    const TOKEN='v7x1-d56f91e2669f8af87a3481d30edc66e27808fe60';\n    const API='https://headless.tebex.io/api';\n    const pkg=sel.pkg;\n    const label='BUY '+sel.name;\n    return async (e) => {\n      if (e && e.preventDefault) e.preventDefault();\n      const input=document.getElementById('iwb-mc-user');\n      const err=document.getElementById('iwb-mc-err');\n      const btn=document.getElementById('iwb-buy-btn');\n      const name=((input && input.value) ? input.value : '').trim();\n      if(!name){ if(err){ err.textContent='Enter your Minecraft username first.'; err.style.display='block'; } if(input) input.focus(); return; }\n      if(err) err.style.display='none';\n      try { localStorage.setItem('iwb_mc_user', name); } catch(_){}\n      if(btn){ btn.textContent='LOADING\\u2026'; btn.style.opacity='.7'; btn.style.pointerEvents='none'; }\n      try {\n        const cbRes=await fetch(API+'/accounts/'+TOKEN+'/baskets',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({username:name,complete_url:location.origin+'/shop/shop-ranks/index.html',cancel_url:location.href,complete_auto_redirect:true})});\n        if(!cbRes.ok) throw new Error('basket '+cbRes.status);\n        const basket=(await cbRes.json()).data;\n        const ident=basket.ident;\n        let checkout=(basket.links && basket.links.checkout) || null;\n        const apRes=await fetch(API+'/baskets/'+ident+'/packages',{method:'POST',headers:{'Content-Type':'application/json','Accept':'application/json'},body:JSON.stringify({package_id:pkg,quantity:1})});\n        if(apRes.ok){ const apd=await apRes.json(); if(apd && apd.data && apd.data.links && apd.data.links.checkout) checkout=apd.data.links.checkout; }\n        let authUrl=null;\n        try {\n          const arRes=await fetch(API+'/accounts/'+TOKEN+'/baskets/'+ident+'/auth?returnUrl='+encodeURIComponent(checkout || location.href));\n          if(arRes.ok){ const aj=await arRes.json(); const list=Array.isArray(aj)?aj:((aj && aj.data)?aj.data:[]); if(list && list.length && list[0] && list[0].url) authUrl=list[0].url; }\n        } catch(_){}\n        const dest=authUrl || checkout;\n        if(dest){ location.href=dest; return; }\n        throw new Error('no checkout');\n      } catch(ex){\n        if(btn){ btn.textContent=label; btn.style.opacity=''; btn.style.pointerEvents=''; }\n        if(err){ err.textContent='Something went wrong \\u2014 please try again.'; err.style.display='block'; }\n      }\n    };\n  }\n  renderVals(){\n    const list=this.ranks();\n    const key=this.currentKey();\n    const sel=list.find(r => r.key === key) || list[0];\n    const others=list.filter(r => r.key !== sel.key).map(r => ({ key:r.key, name:r.name, price:r.price, color:r.color }));\n    if(!this._pf){ this._pf=true; try { setTimeout(function(){ var i=document.getElementById('iwb-mc-user'); if(i && !i.value){ try{ var s=localStorage.getItem('iwb_mc_user'); if(s) i.value=s; }catch(e){} } },0); } catch(e){} }\n    return { sel, others, buy:this.makeBuy(sel) };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>", "Shop - Ranks.dc": "<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"c3a70402-0742-4d89-9779-a767812ef600\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<link rel=\"preconnect\" href=\"https://fonts.googleapis.com\">\n<link rel=\"preconnect\" href=\"https://fonts.gstatic.com\" crossorigin=\"\">\n<style>/* vietnamese */\n@font-face {\n  font-family: 'Anton';\n  font-style: normal;\n  font-weight: 400;\n  font-display: swap;\n  src: url(\"a612b3ce-b409-45b3-90e0-97d87367567a\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, placeholder-val=\"{{ true }}\"><div style=\"position:absolute;top:10px;right:10px;background:#E11515;color:#fff;font-family:'Bangers',cursive;font-size:12px;letter-spacing:1px;padding:3px 10px;border:2px solid #fff;\">★ POPULAR<\u002Fdiv><\u002Fsc-if>\n            <div style=\"position:absolute;left:0;right:0;bottom:0;padding:16px 16px 14px;background:linear-gradient(to top, rgba(0,0,0,.9), rgba(0,0,0,.55) 60%, transparent);\">\n              <div style=\"font-family:'Barlow';font-weight:900;font-size:9px;letter-spacing:1.5px;color:#c8ccd4;\">{{ r.tier }}<\u002Fdiv>\n              <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:8px;\">\n                <span style=\"font-family:'Anton',sans-serif;font-style:italic;font-size:28px;color:#fff;line-height:.9;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;\">{{ r.name }}<\u002Fspan>\n                <span style=\"font-family:'Anton',sans-serif;font-style:italic;font-size:24px;color:#FFD23D;flex:none;white-space:nowrap;\">{{ r.price }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"padding:11px 16px;display:flex;align-items:center;justify-content:space-between;font-family:'Anton',sans-serif;font-style:italic;font-size:14px;color:#8a90a0;\">VIEW DETAILS<span style=\"color:#FFD23D;\">›<\u002Fspan><\u002Fdiv>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  ranks(){\n    const base = [\n      { key:'atomic',     name:'ATOMIC',     price:'$9.99',  tier:'ENTRY TIER', color:'#2E6BFF', popular:false },\n      { key:'immortal',   name:'IMMORTAL',   price:'$19.99', tier:'TIER II',    color:'#FFD23D', popular:false },\n      { key:'invincible', name:'INVINCIBLE', price:'$29.99', tier:'TIER III',   color:'#E11515', popular:true  },\n      { key:'conquest',   name:'CONQUEST',   pr Fstyle>\n<script src=\"684dabc0-0d3a-423b-9daf-1555437ea9f2\"><\u002Fscript>\n<style>\n  *{box-sizing:border-box;}\n  body{margin:0;background:#000;}\n  ::-webkit-scrollbar{height:8px;width:8px;}\n  ::-webkit-scrollbar-thumb{background:#2a2f3a;border-radius:4px;}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div style=\"background:#000;font-family:'Barlow',sans-serif;min-height:100vh;\">\n\n  <!-- header -->\n  <div style=\"background:#000;border-bottom:2px solid #1c1c1c;padding:20px 56px;display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;\">\n    <div style=\"font-family:'Anton',sans-serif;font-style:italic;font-size:30px;color:#fff;line-height:.9;\">SERVER SHOP<\u002Fdiv>\n    <div style=\"display:flex;align-items:center;gap:10px;\">\n      <span style=\"width:9px;height:9px;border-radius:50%;background:#9eff2a;box-shadow:0 0 8px #9eff2a;\"><\u002Fspan>\n      <span style=\"font-family:'Barlow';font-weight:800;font-size:11px;letter-spacing:1px;color:#8a90a0;\">SECURE CHECKOUT · INSTANT IN-GAME DELIVERY<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"max-width:1320px;margin:0 auto;padding:32px 56px 72px;\">\n    <div style=\"font-family:'Bangers',cursive;font-size:15px;letter-spacing:3px;color:#FFD23D;\">STRAIGHT OFF THE PRESS<\u002Fdiv>\n    <h2 style=\"font-family:'Anton',sans-serif;font-style:italic;font-size:38px;color:#fff;margin:2px 0 22px;\">SHOP CATEGORIES<\u002Fh2>\n\n    <!-- comic panel grid -->\n    <div style=\"background:#000;border:4px solid #000;display:grid;grid-template-columns:repeat(4,1fr);gap:4px;\">\n      <sc-for list=\"{{ cats }}\" as=\"cat\" hint-placeholder-count=\"8\">\n        <a href=\"{{ cat.href }}\" onclick=\"{{ cat.onClick }}\" style=\"cursor:{{ cat.cursor }};text-decoration:none;position:relative;overflow:hidden;background:{{ cat.color }};min-height:158px;padding:16px;display:flex;flex-direction:column;justify-content:space-between;transition:transform .12s;\" style-hover=\"transform:scale(1.03);\">\n          <div style=\"position:absolute;inset:0;opacity:.16;background-image:radial-gradient(#000 1.3px, transparent 1.6px);background-size:9px 9px;\"><\u002Fdiv>\n          <div style=\"position:relative;display:flex;justify-content:space-between;align-items:flex-start;\">\n            <span style=\"font-family:'Anton',sans-serif;font-style:italic;font-size:30px;color:{{ cat.fg }};line-height:1;\">{{ cat.glyph }}<\u002Fspan>\n            <span style=\"font-family:'Barlow';font-weight:900;font-size:9px;letter-spacing:1px;color:{{ cat.fg }};border:2px solid {{ cat.fg }};padding:2px 6px;opacity:.85;\">{{ cat.badge }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"position:relative;\">\n            <div style=\"font-family:'Anton',sans-serif;font-style:italic;font-size:22px;color:{{ cat.fg }};line-height:.9;\">{{ cat.name }}<\u002Fdiv>\n            <div style=\"font-family:'Barlow';font-weight:700;font-size:11px;color:{{ cat.fg }};opacity:.8;\">{{ cat.sub }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fa>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <!-- cover star supporter -->\n    <div style=\"margin-top:24px;background:#FFD23D;border:3px solid #fff;box-shadow:8px 8px 0 rgba(0,0,0,.6);display:grid;grid-template-columns:200px 1fr;\">\n      <div style=\"border-right:3px solid #111;background:#fff;position:relative;overflow:hidden;min-height:190px;\">\n        <image-slot id=\"store-sup\" shape=\"rect\" placeholder=\"Supporter art\" style=\"display:block;width:100%;height:100%;\"><\u002Fimage-slot>\n        <div style=\"position:absolute;left:8px;bottom:8px;background:#E11515;color:#fff;font-family:'Bangers',cursive;font-size:13px;letter-spacing:1px;padding:3px 10px;border:2px solid #fff;\">COVER STAR<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:22px 26px;display:flex;flex-direction:column;justify-content:center;\">\n        <div style=\"font-family:'Bangers',cursive;font-size:14px;letter-spacing:2px;color:#7a6a1f;\">SUPPORTER OF THE MONTH<\u002Fdiv>\n        <div style=\"font-family:'Anton',sans-serif;font-style:italic;font-size:40px;color:#111;line-height:.9;margin:2px 0 4px;\">{{ sup.name }}<\u002Fdiv>\n        <div style=\"font-family:'Barlow';font-weight:800;font-size:12px;color:#7a6a1f;margin-bottom:10px;\">{{ sup.tier }} SUPPORTER · {{ sup.amount }} CONTRIBUTED · {{ sup.months }} MONTHS RUNNING<\u002Fdiv>\n        <p style=\"font-family:'Barlow';font-style:italic;font-size:15px;color:#3a3522;margin:0;line-height:1.45;max-width:640px;\">{{ sup.quote }}<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    \n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  cats(){\n    const inert = (e) => { if (e && e.preventDefault) e.preventDefault(); };\n    const real = [\n      { name:'RANKS',  sub:'8 premium tiers', color:'#2E6BFF', fg:'#fff', glyph:'★', badge:'LIVE', cursor:'pointer', href:'/shop/shop-ranks/index.html', onClick:null },\n      { name:'CRATES', sub:'Loot & keys',     color:'#FFD23D', fg:'#111', glyph:'◆', badge:'SOON', cursor:'not-allowed', href:'#', onClick:inert },\n      { name:'CUSTOM', sub:'Bespoke perks',   color:'#E11515', fg:'#fff', glyph:'✦', badge:'SOON', cursor:'not-allowed', href:'#', onClick:inert },\n    ];\n    const blanks = [4,5,6,7,8].map(n => ({ name:'COMING SOON', sub:'CATEGORY 0'+n, color:'#15171d', fg:'#5b6270', glyph:'?', badge:'SOON', cursor:'not-allowed', href:'#', onClick:inert }));\n    return real.concat(blanks);\n  }\n  pays(){\n    return [\n      { user:'Anonymous',  item:'Invincible', tier:'#E11515', time:'2m ago',  amt:'$29.99' },\n      { user:'Anonymous',    item:'Atomic',     tier:'#2E6BFF', time:'14m ago', amt:'$9.99'  },\n      { user:'Anonymous',item:'Immortal',   tier:'#FFD23D', time:'38m ago', amt:'$19.99' },\n      { user:'Anonymous',  item:'Conquest',   tier:'#0a0b0e', time:'1h ago',  amt:'$49.99' },\n      { user:'Anonymous',    item:'Atomic',     tier:'#2E6BFF', time:'2h ago',  amt:'$9.99'  },\n      { user:'Anonymous',  item:'Immortal',   tier:'#FFD23D', time:'3h ago',  amt:'$19.99' },\n      { user:'Anonymous',    item:'Invincible', tier:'#E11515', time:'5h ago',  amt:'$29.99' },\n      { user:'Anonymous',   item:'Atomic',     tier:'#2E6BFF', time:'6h ago',  amt:'$9.99'  },\n    ];\n  }\n  sup(){\n    return { name:'None', tier:'-', amount:'-', months:0, quote:'' };\n  }\n  renderVals(){ return { cats:this.cats(), pays:this.pays(), sup:this.sup() }; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"}, "entry": "Shop - Rank Details.dc"}</script>
